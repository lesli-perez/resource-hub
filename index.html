<!DOCTYPE html>
<html>
<head>
  <title>Resource Hub</title>
  <link rel="stylesheet" href="styles.css">
  <!-- Include marked.js for Markdown support -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>

<h1>📁 Resource Hub</h1>

<div class="topbar">
  <div class="status" id="statusText">Viewing All Files - click on a tag to add a filter.</div>
  <button class="reset-btn" onclick="resetFilter()">Show All</button>
</div>

<input type="text" id="search" placeholder="Search..." onkeyup="filter()">

<div id="container"></div>

<script>
let data = [];
let currentFilter = null;

// Load JSON file
fetch('files.json')
  .then(res => res.json())
  .then(json => {
    data = json;
    render(data);
  });

// Render function
function render(items) {
  const container = document.getElementById("container");
  container.innerHTML = "";

  items.forEach(item => {
    const div = document.createElement("div");
    div.className = "card";

    // Join description array into a single string
    const descriptionHtml = Array.isArray(item.description) 
      ? item.description.join("\n\n") 
      : item.description || "";

    div.innerHTML = `
      <div class="left">
        <h3>  
            <a href="${item.url}" target="_blank">${item.title}</a>
        </h3>
        ${item.image ? `<img src="${item.image}" width="200">` : ""}
        <p>
          ${item.tags.map(tag => `<span class="tag" onclick="filterTag('${tag}')">${tag}</span>`).join("")}
        </p>
        <a href="${item.file}" target="_blank" onclick="markDownloaded(this)">Open/Download Files</a>
      </div>

      <div class="right">
        ${marked.parse(descriptionHtml)}
      </div>
    `;

    container.appendChild(div);
  });
}

// Search filter
function filter() {
  const q = document.getElementById("search").value.toLowerCase();
  currentFilter = q || null;
  updateStatus();

  render(data.filter(d =>
    d.title.toLowerCase().includes(q) ||
    d.tags.join(" ").toLowerCase().includes(q)
  ));
}

// Filter by tag
function filterTag(tag) {
  currentFilter = tag;
  updateStatus();

  render(data.filter(d => d.tags.includes(tag)));
}

// Reset filters
function resetFilter() {
  document.getElementById("search").value = "";
  currentFilter = null;
  updateStatus();
  render(data);
}

// Update status bar
function updateStatus() {
  const status = document.getElementById("statusText");
  if (!currentFilter) {
    status.textContent = "Viewing All Files - click on a tag to add a filter.";
  } else {
    status.textContent = "Filtered by: " + currentFilter;
  }
}

// Mark card as downloaded
function markDownloaded(link) {
  const card = link.closest(".card");
  card.classList.add("downloaded");
}
</script>

</body>
</html>
